{% block modal %}
<div class="modal fade" id="add_Profesional" tabindex="-1" role="dialog" aria-labelledby="basicModal" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title" id="myModalLabel">Agregar Profesional</h4>
                <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
            </div>
            <div class="container contenido">
                <!-- Content Wrapper -->
                <div id="content-wrapper" class="d-flex flex-column">
                    <!-- Main Content -->
                    <div id="content">
                        <form action="/agregar_profesional" method="post">
                            <div class="modal-body px-4">
                                   <div class="card shadow-sm mb-4">
                                        <div class="card-header bg-secondary text-white py-2" style="letter-spacing:1px;">
                                            <strong>DATOS PERSONALES</strong>
                                        </div>

                                        <div class="card-body">
                                            <div class="row g-3">
                                                <div class="col-md-6">
                                                    <label><strong>NOMBRE *</strong></label>
                                                    <input type="text" class="form-control" align="left" title="Nombre" name="nombre" id="nombre" placeholder="Nombre*" oninput="this.value=this.value.toUpperCase()" maxlength="100" required/>
                                                </div>

                                                <div class="col-md-6">
                                                    <label><strong>APELLIDO *</strong></label>
                                                    <input type="text"  name="apellido"  class="form-control" id="apellido" title="Apellido" maxlength="150" oninput="this.value=this.value.toUpperCase()" placeholder="Apellido" required/>
                                                </div>
                                            </div>
                                            <!-- SEPARADOR -->
                                            <div class="mt-3"></div>
                                            <div class="row g-3">
                                                <div class="col-md-12">
                                                    <label><strong>CUIT / CUIL *</strong></label>
                                                </div>
                                            </div>
                                            <div class="row g-3 align-items-center">
                                                <div class="col-md-3">
                                                    <input name="cuil_cuit" type="text" class="form-control" id="cuil_cuit" title="Cuit o Cuil, con el formato xx-xxxxxxxx-x"  maxlength="13" pattern=".{13,}" oninput="handleMask(event, '99-99999999-9')" placeholder="__-________-_ CUIT/CUIL*"  style="width:250px" required/>
                                                </div>

                                                <div class="col-md-6">
                                                    <label ><a href="https://www.anses.gob.ar/consultas/constancia-de-cuil" target="_blank" style="color:#fa51b9"><h6><strong>Consulta CUIT/CUIL ANSES <img src="/static/imagenes/anses.png" width="30" height="30" /></strong></h6></a></label>
                                                </div>
                                            </div>
                                        </div>
                                    </div> 
                                    <div class="card shadow-sm mb-4">
                                        <div class="card-header bg-secondary text-white py-2" style="letter-spacing:1px;">
                                            <strong>DATOS CONTACTO</strong>
                                        </div>

                                        <div class="card-body">
                                            <div class="row g-3 mb-1">
                                                <div class="col-md-6">
                                                    <label><strong>TELÉFONO CONTACTO (CELULAR) - SIN 0 Y SIN 15</strong></label>
                                                </div>
                                                <div class="col-md-6">
                                                    <label><strong>E-MAIL</strong></label>
                                                </div>
                                            </div>
                                            <div class="row g-3">
                                                <div class="col-md-2">
                                                    <input type="number" class="form-control" name="areaCelular" id="areaCelular" placeholder="Área">
                                                </div>

                                                <div class="col-md-4">
                                                    <input type="number" class="form-control" name="nroCelular" id="nroCelular" placeholder="Nro. sin 15">
                                                </div>

                                                <div class="col-md-6">
                                                    <input type="email" class="form-control" name="email" id="email" placeholder="E-mail">
                                                </div>
                                            </div>
                                            <!-- SEPARADOR -->
                                            <div class="mt-3"></div>
                                            <div class="row g-3">
                                                <div class="col-md-6">
                                                    <label><strong>DOMICILIO</strong></label>
                                                    <input name="calle" type="text" class="form-control" id="calle" title="Domicilio" maxlength="50" placeholder="Domicilio"  oninput="this.value=this.value.toUpperCase()"  />
                                                </div>

                                                <div class="col-md-1">
                                                    <label><strong>NRO.</strong></label>
                                                    <input name="nroCalle" type="number" class="form-control" id="nroCalle" placeholder="Nro.">
                                                </div>

                                                <div class="col-md-1">
                                                    <label><strong>PISO</strong></label>
                                                    <input name="piso" type="text" class="form-control" id="piso" title="Piso" maxlength="2"  size="2"  style="width:75px"  oninput="this.value=this.value.toUpperCase()" onChange="this.value = this.value.substring(0,2)" placeholder="Piso" />
                                                </div>

                                                <div class="col-md-1">
                                                    <label><strong>DPTO.</strong></label>
                                                    <input name="dpto"  class="form-control" id="dpto" title="Dpto." maxlength="2"  size="2"  style="width:75px" type="text" placeholder="Dpto."  oninput="this.value=this.value.toUpperCase()"/>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="card shadow-sm mb-4">
                                        <div class="card-header bg-secondary text-white py-2" style="letter-spacing:1px;">
                                            <strong>DATOS PROFESIONALES</strong>
                                        </div>

                                        <div class="card-body">
                                            <div class="row g-3">
                                                <div class="col-md-6">
                                                    <label><strong>TIPO PROFESIÓN *</strong></label>
                                                    <select name="idTipoProfesion" id="idTipoProfesion" class="form-control" required>
                                                        <option value="" selected>Seleccione tipo de profesión</option>
                                                        {% for tipo in tiposProfesiones %}
                                                            <option value="{{ tipo.idTipoProfesion }}">{{ tipo.nombre }}</option>
                                                        {% endfor %}
                                                    </select>
                                                </div>
                                                <div class="col-md-6">
                                                    <label><strong>MATRÍCULA</strong></label>
                                                    <input type="text" class="form-control" title="Matrícula" name="matricula" id="matricula"  placeholder="Matr&iacute;cula" maxlength="10" style="width:100px" oninput="" onChange="this.value = this.value.substring(0,10)"  />
                                                </div>
                                            </div>
                                           <!-- SEPARADOR -->
                                           <div class="mt-3"></div>
                                           <div class="row g-3">
                                                <div class="col-md-6">
                                                    <label><strong>RAZÓN SOCIAL (En caso de representar alguna empresa, constructora, etc.)</strong></label>
                                                    <input name="razonSocial" type="text" class="form-control" id="razonSocial" title="Raz&oacute;n Social" maxlength="250" placeholder="Raz&oacute;n Social"  oninput="this.value=this.value.toUpperCase()"  />
                                                </div>
                                            </div>

                                        </div>
                                    </div>
                                    <div class="modal-footer justify-content-center">
                                        <button type="button" class="cancela btn btn-default" data-dismiss="modal">Cerrar</button>
                                        <button type="submit" class="acepta btn btn-success">Agregar</button>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>              
        </div>
    </div>
</div>

{% endblock modal %}
